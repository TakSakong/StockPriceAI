name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  # ── Backend ────────────────────────────────────────────────
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: backend-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-root

      - name: Lint (ruff)
        run: poetry run ruff check app

      - name: Type check (mypy)
        run: poetry run mypy app || true   # 초기 단계에서는 경고만

      - name: Test (pytest)
        run: poetry run pytest tests/ -v --tb=short || true

  # ── ML Service ─────────────────────────────────────────────
  ml:
    name: ML Service (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ml-${{ hashFiles('ml/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-root

      - name: Lint (ruff)
        run: poetry run ruff check app

      - name: Test (pytest)
        run: poetry run pytest tests/ -v --tb=short || true

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    name: Frontend (type-check + lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check || true

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build || true
