name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

# 같은 브랜치/PR에서 새 커밋이 오면 이전 실행을 취소
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ────────────────────────────────────────────────
  backend:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: backend-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-root

      - name: Lint (ruff)
        run: poetry run ruff check app

      - name: Type check (mypy)
        run: poetry run mypy app

      - name: Test (pytest)
        run: poetry run pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── ML Service ─────────────────────────────────────────────
  ml:
    name: ML Service (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ml-${{ hashFiles('ml/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-root

      - name: Lint (ruff)
        run: poetry run ruff check app

      - name: Type check (mypy)
        run: poetry run mypy app

      - name: Test (pytest)
        run: poetry run pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ml-coverage
          path: ml/coverage.xml

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    name: Frontend (type-check + lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ── Docker build smoke test ────────────────────────────────
  docker:
    name: Docker builds (production targets)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target production -t backend-prod ./backend

      - name: Build ml image
        run: docker build --target production -t ml-prod ./ml

      - name: Build frontend image
        run: docker build --target production -t frontend-prod ./frontend
