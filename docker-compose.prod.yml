version: "3.9"

# 프로덕션 오버라이드: docker-compose.yml 위에 병합해서 사용
# 실행: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  frontend:
    build:
      context: ./frontend
      target: production
    volumes: []   # 프로덕션에서 소스 마운트 제거

  backend:
    build:
      context: ./backend
      target: production
    volumes: []
    environment:
      - DATABASE_URL=${RDS_URL}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ML_SERVICE_URL=http://ml:8001
    ports: []     # 외부 직접 노출 제거 (Nginx 경유)

  ml:
    build:
      context: ./ml
      target: production
    volumes: []
    environment:
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/2
    ports: []

  celery_worker:
    build:
      context: ./ml
      target: production
    volumes: []

  nginx:
    ports:
      - "443:443"
    volumes:
      # HTTPS 인증서 파일을 nginx 컨테이너 안에서 읽을 수 있도록 마운트
      # certbot이 발급한 인증서(/etc/letsencrypt/)를 읽기 전용으로 공유합니다
      # HTTPS 설정 전에는 이 볼륨이 있어도 정상 동작에 영향 없음
      - /etc/letsencrypt:/etc/letsencrypt:ro

  postgres:
    profiles: ["local"]   # 프로덕션에서는 RDS를 사용하므로 비활성화
